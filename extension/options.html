<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AIKeep24 Settings</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-width: 420px; padding: 24px; }
h1 { font-size: 18px; color: #86efac; margin-bottom: 16px; }
.section { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 16px; margin-bottom: 12px; }
.section h2 { font-size: 13px; color: #93c5fd; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 4px; }
input, select { width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; color: #e4e4e7; font-size: 13px; padding: 8px 10px; margin-bottom: 10px; outline: none; }
input:focus, select:focus { border-color: #86efac; }
.row { display: flex; gap: 10px; }
.row > div { flex: 1; }
button { background: #86efac; color: #0f172a; border: none; border-radius: 6px; padding: 10px 20px; font-size: 13px; font-weight: 700; cursor: pointer; transition: background 0.15s; }
button:hover { background: #6ee7b7; }
.status { font-size: 12px; color: #86efac; margin-top: 8px; display: none; }
.test-btn { background: #93c5fd; margin-left: 8px; padding: 10px 16px; }
.test-btn:hover { background: #7cb3f0; }
.test-result { font-size: 11px; color: #94a3b8; margin-top: 6px; font-family: monospace; white-space: pre-wrap; max-height: 120px; overflow-y: auto; display: none; }
</style>
</head>
<body>
<h1>AIKeep24 Settings</h1>

<div class="section">
  <h2>LLM Model</h2>
  <label>Ollama Model Name</label>
  <input type="text" id="model" placeholder="e.g. exaone3.5:7.8b, llama3.2, gemma2:9b, coolsoon/kanana-1.5-8b">
  <label>Ollama Server URL</label>
  <input type="text" id="ollamaUrl" placeholder="http://localhost:11434">
  <div class="row">
    <div>
      <label>Context Size (num_ctx)</label>
      <input type="number" id="numCtx" placeholder="6144">
    </div>
    <div>
      <label>Max Tokens (num_predict)</label>
      <input type="number" id="numPredict" placeholder="384">
    </div>
    <div>
      <label>Temperature</label>
      <input type="number" id="temperature" step="0.1" placeholder="0.3">
    </div>
  </div>
</div>

<div class="section">
  <h2>Backend</h2>
  <label>Worker URL</label>
  <input type="text" id="workerUrl" placeholder="https://aikeep24-web.yourname.workers.dev">
  <label>API Key</label>
  <input type="password" id="apiKey" placeholder="Your API key">
</div>

<div class="section">
  <h2>Chunking</h2>
  <div class="row">
    <div>
      <label>Turns per Chunk</label>
      <input type="number" id="turnsPerChunk" placeholder="20">
    </div>
    <div>
      <label>Max Text Length</label>
      <input type="number" id="maxTextLen" placeholder="8000">
    </div>
  </div>
</div>

<div style="display:flex;align-items:center;">
  <button id="saveBtn">Save Settings</button>
  <button id="testBtn" class="test-btn">Test Ollama</button>
</div>
<div class="status" id="status">Settings saved!</div>
<div class="test-result" id="testResult"></div>

<script src="options.js"></script>
</body>
</html>
