<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AIKeep24 Settings</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0D1117;color:#E6EDF3;font-family:-apple-system,BlinkMacSystemFont,sans-serif;padding:24px;min-width:400px}
h1{color:#86efac;font-size:1.4em;font-style:italic;margin-bottom:20px}
.section{background:#161B22;border:1px solid #30363D;border-radius:10px;padding:16px;margin-bottom:16px}
.section h2{font-size:0.85em;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#E6EDF3;margin-bottom:12px}
label{display:block;font-size:12px;color:#8B949E;margin-bottom:4px;margin-top:10px}
label:first-of-type{margin-top:0}
input,select{width:100%;padding:10px 12px;background:#0D1117;border:1px solid #30363D;border-radius:8px;color:#E6EDF3;font-size:14px;outline:none}
input:focus,select:focus{border-color:#7AA2F7}
.row{display:flex;gap:12px}
.row .col{flex:1}
.actions{display:flex;gap:12px;margin-top:20px}
button{padding:10px 20px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:opacity 0.2s}
button:hover{opacity:0.85}
#btnSave{background:#86efac;color:#0f172a}
#btnTest{background:#30363D;color:#E6EDF3;border:1px solid #30363D}
#status{margin-top:12px;font-size:13px;padding:8px 12px;border-radius:6px;display:none}
.ok{background:#86efac22;color:#86efac;display:block!important}
.err{background:#f8717122;color:#f87171;display:block!important}
.backend-group{display:none}
.backend-group.active{display:block}
</style>
</head>
<body>
<h1>AIKeep24 Settings</h1>

<div class="section">
  <h2>LLM Backend</h2>
  <label>Backend</label>
  <select id="backend">
    <option value="ollama">Ollama</option>
    <option value="optiq">Optiq (mlx_lm.server)</option>
  </select>

  <div class="backend-group" id="ollamaGroup">
    <label>Ollama Model Name</label>
    <input id="model" type="text" value="exaone3.5:7.8b">
    <label>Ollama Server URL</label>
    <input id="ollamaUrl" type="text" value="http://localhost:11434">
  </div>

  <div class="backend-group" id="optiqGroup">
    <label>Optiq Model Name</label>
    <input id="optiqModel" type="text" value="FakeRockert543/gemma-4-e4b-it-MLX-4bit">
    <label>Optiq Server URL</label>
    <input id="optiqUrl" type="text" value="http://localhost:8080">
  </div>

  <div class="row" style="margin-top:10px;">
    <div class="col"><label>Context Size (num_ctx, Ollama)</label><input id="numCtx" type="number" value="6144"></div>
    <div class="col"><label>Max Tokens (num_predict / max_tokens)</label><input id="numPredict" type="number" value="384"></div>
    <div class="col"><label>Temperature</label><input id="temperature" type="text" value="0.3"></div>
  </div>
  <div style="margin-top:12px;display:flex;align-items:center;gap:10px;">
    <label style="margin:0;font-size:12px;color:#8B949E;">Thinking Mode</label>
    <div id="thinkToggle" style="width:44px;height:24px;border-radius:12px;background:#30363D;cursor:pointer;position:relative;transition:background 0.2s;" data-on="false">
      <div id="thinkKnob" style="width:20px;height:20px;border-radius:50%;background:#8B949E;position:absolute;top:2px;left:2px;transition:all 0.2s;"></div>
    </div>
    <span id="thinkLabel" style="font-size:12px;color:#f87171;font-weight:600;">OFF</span>
    <span style="font-size:11px;color:#565F89;margin-left:4px;">Thinking 모델(Qwen3/Gemma4 등)은 OFF 권장 — 요약 속도 2~3배 향상</span>
  </div>
</div>

<div class="section">
  <h2>Backend Storage</h2>
  <label>Worker URL</label>
  <input id="workerUrl" type="text" value="https://aikeep24-web.hugh79757.workers.dev">
  <label>API Key</label>
  <input id="apiKey" type="password" value="">
</div>

<div class="section">
  <h2>Chunking</h2>
  <div class="row">
    <div class="col"><label>Turns per Chunk</label><input id="turnsPerChunk" type="number" value="20"></div>
    <div class="col"><label>Max Text Length</label><input id="maxTextLen" type="number" value="8000"></div>
  </div>
</div>

<div class="actions">
  <button id="btnSave">Save Settings</button>
  <button id="btnTest">Test Connection</button>
</div>
<div id="status"></div>

<script src="options.js"></script>
</body>
</html>
